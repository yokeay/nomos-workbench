version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - sqlite_data:/app/data
    environment:
      - DATABASE_URL=/app/data/workbench.db
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-development-secret-change-in-production}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXT_PUBLIC_TERMINAL_WS_URL=${TERMINAL_WS_URL:-ws://localhost:8080}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: gotty for Terminal (uncomment if using)
  # gotty:
  #   image: yudai/gotty:latest
  #   command: gotty -w --port 8080 /bin/bash
  #   ports:
  #     - "8080:8080"

volumes:
  sqlite_data:
    driver: local